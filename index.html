<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  
  <title>EASTBUSY</title>
  <style>
    /* 1. 깃허브에 올린 내 폰트 파일(woff2)을 웹사이트 시스템에 등록 */
    @font-face {
      font-family: 'MinionVariable'; 
      src: url('minionvariableconcept.woff2') format('woff2'); 
      font-weight: normal;
      font-style: normal;
    }

    /* 화면 전체 기본 세팅 */
    body {
      background: #ffffff !important; 
      color: #000000 !important;      
      font-family: 'MinionVariable', Georgia, serif; 
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased; 
    }

    /* [핵심 추가] 모바일 브라우저의 강제 다크모드 반전을 물리적으로 무력화하는 화이트 장벽 레이어 */
    .mobile-white-wall {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff !important; /* 브라우저 반전 기능을 뚫고 무조건 흰색 유지 */
      display: flex; 
      justify-content: center; 
      align-items: center;
      z-index: 9999; /* 화면의 최상단 레이어로 배치 */
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       
      height: auto;       
      margin-bottom: 24px; 
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 24px;     
      font-weight: 700;    
      letter-spacing: 0.5px; 
      color: #000000 !important; /* 글자색도 강제로 검은색 고정 */
    }
  </style>
</head>
<body>

  <div class="mobile-white-wall">
    <div class="content-box">
      <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
      
      <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
    </div>
  </div>
  
</body>
</html>
