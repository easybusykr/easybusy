<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  
  <title>EASTBUSY</title>
  <style>
    /* 1. 폰트 파일 등록 */
    @font-face {
      font-family: 'MinionVariable'; 
      src: url('minionvariableconcept.woff2') format('woff2'); 
      font-weight: normal;
      font-style: normal;
    }

    /* 화면 전체 기본 세팅 */
    body {
      background: #ffffff !important; 
      color: #000000 !important;      
      font-family: 'MinionVariable', Georgia, serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased; 
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       
      height: auto;       
      margin-bottom: 24px; 
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 24px;     
      font-weight: 700;    
      letter-spacing: 0.5px; 
    }
  </style>
</head>
<body>

  <div class="content-box">
    <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
    
    <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
  </div>
  
</body>
</html>
