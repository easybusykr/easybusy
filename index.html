<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EASTBUSY</title>
  <style>
    /* 1. 깃허브에 올린 내 폰트 파일(woff2)을 웹사이트 시스템에 등록 */
    @font-face {
      font-family: 'MinionVariable'; 
      src: url('minionvariableconcept.woff2') format('woff2'); 
      font-weight: normal;
      font-style: normal;
    }

    /* 화면 전체 기본 세팅 */
    body {
      /* [수정 완료] 로고 주변은 완전한 화이트(#ffffff) 광량을 폭발시키고, 외각으로 멀어질수록 미세하게 음영이 지는 포인트 라이팅 */
      background: radial-gradient(circle at center, #ffffff 0%, #ffffff 35%, #F9F9F8 75%, #F2F1ED 100%);
      color: #000000;      
      
      font-family: 'MinionVariable', Georgia, serif; 
      
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased; 
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       
      height: auto;       
      margin-bottom: 24px; 
      
      /* 중앙의 강력한 흰색 광량 영역과 로고의 흰색 사각형이 수학적으로 100% 일치되어 경계선이 사라집니다 */
      mix-blend-mode: multiply; 
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 24px;     
      font-weight: 700;    
      letter-spacing: 0.5px; 
    }
  </style>
</head>
<body>

  <div class="content-box">
    <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
    
    <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
  </div>
  
</body>
</html>
