<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EASTBUSY</title>
  <style>
    /* [추가] 1. 깃허브에 올린 내 폰트 파일(woff2)을 웹사이트 시스템에 등록 */
    @font-face {
      font-family: 'MinionVariable'; /* 사용할 폰트의 고유 별명 지정 */
      src: url('minionvariableconcept.woff2') format('woff2'); /* 방금 올린 파일명과 정확히 일치 */
      font-weight: normal;
      font-style: normal;
    }

    /* 화면 전체 기본 세팅 (배경을 흰색으로 변경) */
    body {
      background: #ffffff; /* 웹사이트 배경색: 흰색 */
      color: #000000;      /* 글자 색상: 검은색 */
      
      /* [수정] 2. 기본 서체 대신 방금 등록한 'MinionVariable' 서체를 1순위로 적용합니다 */
      font-family: 'MinionVariable', Georgia, serif; 
      
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased; /* 글자 외곽선을 깨끗하고 선명하게 다듬는 옵션 */
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 정중앙에서 위쪽 방향으로 15%만큼 밀어 올리기 */
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       /* 화면에 보여질 로고 가로 크기 (원하는 대로 조절) */
      height: auto;       /* 가로에 맞춰 세로 비율 고정 */
      margin-bottom: 24px; /* 로고와 아래 슬로건 글자 사이의 간격 */
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 24px;     /* Minion 서체의 우아함을 살리기 위해 크기를 시원하게 키웠습니다 */
      font-weight: normal; /* 변수형 명조 서체 특유의 클래식한 멋을 위해 두께를 기본형으로 세팅 */
      letter-spacing: 0.5px; /* 명조 계열에 어울리는 여유로운 자간 배치 */
    }
  </style>
</head>
<body>

  <div class="content-box">
    <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
    
    <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
  </div>
  
</body>
</html>
