<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EASTBUSY</title>
  <style>
    /* 화면 전체 기본 세팅 (배경을 흰색으로 변경) */
    body {
      background: #ffffff; /* 웹사이트 배경색: 흰색 */
      color: #000000;      /* 글자 색상: 검은색 */
      font-family: sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 정중앙에서 위쪽 방향으로 15%만큼 밀어 올리기 */
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       /* 화면에 보여질 로고 가로 크기 (원하는 대로 조절) */
      height: auto;       /* 가로에 맞춰 세로 비율 고정 */
      margin-bottom: 24px; /* 로고와 아래 슬로건 글자 사이의 간격 */
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 22px;     /* 글자 수가 길어졌으므로 크기를 살짝(24->22) 다듬었습니다 */
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="content-box">
    <!-- 로고 이미지 -->
    <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
    
    <!-- [수정완료] 앞뒤로 큰따옴표 기호 코드를 넣었습니다 -->
    <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
  </div>
  
</body>
</html>
