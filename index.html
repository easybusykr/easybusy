<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EASTBUSY</title>
  <style>
    /* 1. 깃허브에 올린 내 폰트 파일(woff2)을 웹사이트 시스템에 등록 */
    @font-face {
      font-family: 'MinionVariable'; 
      src: url('minionvariableconcept.woff2') format('woff2'); 
      font-weight: normal;
      font-style: normal;
    }

    /* 화면 전체 기본 세팅 */
    body {
      /* [원상 복구 완료] 어떠한 계조도 없는 가장 깨끗하고 당당한 순수 100% 화이트 */
      background: #ffffff; 
      color: #000000;      
      
      font-family: 'MinionVariable', Georgia, serif; 
      
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased; 
    }

    /* 로고와 문구를 감싸는 세로 정렬 컨테이너 */
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 화면 정중앙에서 상단으로 15%만큼 밀어 올려 시각적 안정감 확보 */
      transform: translateY(-15%); 
    }

    /* 로고 이미지 스타일 */
    .logo-img {
      width: 280px;       
      height: auto;       
      margin-bottom: 24px; 
      
      /* 배경이 완벽한 화이트이므로 블렌딩 에러 없이 자연스럽게 녹아듭니다 */
    }

    /* 슬로건 타이틀 스타일 */
    h1 {
      margin: 0;
      font-size: 24px;     
      font-weight: 700;    /* 묵직하게 다듬은 굵기값 유지 */
      letter-spacing: 0.5px; 
    }
  </style>
</head>
<body>

  <div class="content-box">
    <img src="logo.svg" alt="EASTBUSY 로고" class="logo-img">
    
    <h1>&ldquo;Make it Easy Make it Busy&rdquo;</h1>
  </div>
  
</body>
</html>
